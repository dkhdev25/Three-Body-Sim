<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>3-Body Sim</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script type="module" src="/index.js"></script>
    <div id="banner">
      <img id="logo" src="itchio.svg">
      <div id="title">3-Body System Simulation</div>
      </div>

      <div id="body-tabs">
        <div class="body-tab active">Body #1</div>
        <div class="body-tab">Body #2</div>
        <div class="body-tab">Body #3</div>
      </div>

        <div id="left-panel-bottom">
          <div class="panel-header">SELECTED STAR</div>
        </div>

        <div id="left-panel-top">
    <div class="panel-header">GLOBAL SETTINGS</div>

    <div class="panel-content">
<div class="setting-row">
    <label>Gravity</label>
    <input id="gravity-input" type="number" value="1" step="0.1">
</div>

<div class="setting-row">
    <label>Speed</label>
    <input id="speed-input" type="number" value="10">
</div>

<div class="setting-row">
    <label>Freeze</label>
    <input id="freeze-input" type="number" value="1000">
</div>

<div class="setting-row">
    <label>Zoom Speed</label>
    <input id="zoom-input" type="number" value="2.5" step="0.1">
</div>

<div class="setting-row">
    <label>Min Zoom</label>
    <input id="minzoom-input" type="number" value="3">
</div>

<div class="setting-row">
    <label>Max Zoom</label>
    <input id="maxzoom-input" type="number" value="500">
</div>

<div class="setting-row">
    <label>Bloom</label>
    <input id="bloom-input" type="number" value="2" step="0.1">
</div>

<div class="setting-row">
    <label>Velocity</label>
    <button id="velocity-toggle" class="toggle on">ON</button>
</div>

<div class="setting-row">
    <label>Gravity</label>
    <button id="gravity-toggle" class="toggle on">ON</button>
</div>

<div class="setting-row">
    <label>Trails</label>
    <button id="trail-toggle" class="toggle off">OFF</button>
</div>

<div class="setting-row">
    <label>Resolution</label>
    <select id="resolution-select">
        <option>100%</option>
        <option>75%</option>
        <option>50%</option>
    </select>
</div>

<div class="setting-row">
    <label>Stars</label>
    <select id="stars-select">
        <option>Low</option>
        <option>Medium</option>
        <option selected>High</option>
    </select>
</div>

    </div>
</div>

    <div id="terminal">
      <div id="terminal-header">TERMINAL</div>

    <div id="terminal-output">
><span style="color: orange"> Three-Body</span></span> <span style="color: red">Simulation</span> v0.1
    <br>
> Type <span style="color: green">"help"</span> for commands

>> <span id="cursor"></span>
    </div>

    </div>
  </body>
</html>
